server:
  port: 8081
spring:
  application:
    name: todo-service
  datasource:
    url: jdbc:postgresql://localhost:5432/food_delivery
    password: 123
    username: postgres
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: on